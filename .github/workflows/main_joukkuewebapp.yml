# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - joukkuewebapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: joukkuern.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_499B814072A14C06A936BCDE97ACF656 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_524DC22B6CE64290A2A70E91FDC96EC7 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: joukkuern.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_499B814072A14C06A936BCDE97ACF656 }}/joukkuebuild:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'joukkuewebapp'
          slot-name: 'Production'
          images: 'joukkuern.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_499B814072A14C06A936BCDE97ACF656 }}/joukkuebuild:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E7EA6F6CA58344B6A1CBEE8952A4DDF5 }}